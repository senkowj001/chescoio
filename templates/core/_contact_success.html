{% comment %}
Contact success fragment — swapped into #contact-form-wrap after a valid
submit (or after a honeypot-tripped bot submit, which sees the same thing).
{% endcomment %}
<div class="rounded-lg border border-neutral-200/70 bg-neutral-50 p-6 sm:p-8 text-center">
    <div class="mx-auto mb-4 h-10 w-10 rounded-full flex items-center justify-center"
         style="background-color: var(--color-brand-primary, #1a4d2e);">
        <svg class="h-5 w-5 text-white" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5"
                  stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
    </div>
    <h2 class="text-xl font-semibold tracking-tight text-neutral-900">Message sent.</h2>
    <p class="mt-2 text-neutral-600 leading-relaxed max-w-md mx-auto">
        Thanks for reaching out — we’ve got your note and will reply to your
        email as soon as we can.
    </p>
</div>
