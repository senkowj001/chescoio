{# Minimal header for Sprint 1 \u2014 fleshed out in Sprint 5 with full nav. #}
{% load catalog_extras %}
<header class="border-b border-neutral-200/70">
    <div class="mx-auto max-w-6xl px-5 sm:px-8 h-16 flex items-center justify-between">
        <a href="/" class="font-semibold tracking-tight text-lg"
           style="color: var(--color-brand-primary);">
            {{ request.brand.name }}
        </a>
        <nav class="flex items-center gap-6 text-sm">
            <a href="{% url 'catalog:product_list' %}"
               class="text-neutral-700 hover:text-neutral-900 transition-colors">
                Shop
            </a>
            {# Mini-cart \u2014 swapped out by HTMX on cart add / update / remove.
               The element id="mini-cart" is the OOB swap target. #}
            {% include "orders/_mini_cart.html" %}
        </nav>
    </div>
</header>
