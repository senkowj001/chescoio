{# Minimal footer for Sprint 1 — gets a sitemap, social links, etc. in Sprint 5. #}
<footer class="mt-auto border-t border-neutral-200/70">
    <div class="mx-auto max-w-6xl px-5 sm:px-8 py-6 flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-neutral-600">
        <p>&copy; {% now "Y" %} {{ request.brand.name }}. All rights reserved.</p>
        {% if request.brand.support_email %}
        <a href="mailto:{{ request.brand.support_email }}"
           class="hover:text-neutral-900 transition-colors">
            {{ request.brand.support_email }}
        </a>
        {% endif %}
    </div>
</footer>
