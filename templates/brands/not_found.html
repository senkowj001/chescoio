{# Rendered by BrandMiddleware when no Brand matches the inbound host.
   Self-contained: cannot extend base.html because request.brand is None here. #}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Site not found</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style type="text/tailwindcss">
        @theme {
            --font-display: "Inter", system-ui, sans-serif;
        }
        @layer base {
            body {
                font-family: var(--font-display);
                -webkit-font-smoothing: antialiased;
            }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-white text-neutral-900 px-6">
    <div class="max-w-md text-center">
        <p class="text-xs uppercase tracking-[0.2em] text-neutral-500 mb-6">Error 404</p>
        <h1 class="text-4xl font-semibold tracking-tight">Site not found</h1>
        <p class="mt-6 text-neutral-600 leading-relaxed">
            We couldn't find a site at this address.
            If you typed the URL directly, double-check the spelling.
        </p>
    </div>
</body>
</html>
